name: Android APK on Version Change

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          VERSION="$(node -p "require('./mobile/package.json').version")"
          RELEASE_TAG="v$VERSION"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          EVENT_NAME="${{ github.event_name }}"
          echo "event_name=$EVENT_NAME"
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 "$AFTER_SHA^" 2>/dev/null || true)"
          fi
          VERSION_CHANGED=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION_CHANGED=true
          elif [ -z "$BEFORE_SHA" ]; then
            VERSION_CHANGED=true
          else
            DIFF="$(git diff "$BEFORE_SHA" "$AFTER_SHA" -- mobile/package.json mobile/android/app/build.gradle || true)"
            if echo "$DIFF" | grep -E '^[+-].*"version"\s*:' >/dev/null; then
              VERSION_CHANGED=true
            fi
            if echo "$DIFF" | grep -E '^[+-].*versionCode\s+[0-9]+' >/dev/null; then
              VERSION_CHANGED=true
            fi
            if echo "$DIFF" | grep -E '^[+-].*versionName\s+"[^"]+"' >/dev/null; then
              VERSION_CHANGED=true
            fi
          fi
          HTTP_STATUS="$(curl -s -o /tmp/release_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")"
          RELEASE_MISSING=false
          if [ "$HTTP_STATUS" = "404" ]; then
            RELEASE_MISSING=true
          fi
          if [ "$HTTP_STATUS" != "404" ]; then
            if [ "$HTTP_STATUS" = "200" ]; then
              :
            else
              echo "Failed to check release existence. HTTP $HTTP_STATUS"
              cat /tmp/release_check.json
              exit 1
            fi
          fi
          if [ "$VERSION_CHANGED" = "true" ] || [ "$RELEASE_MISSING" = "true" ]; then
            echo "Build conditions met (version_changed=$VERSION_CHANGED, release_missing=$RELEASE_MISSING)."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "Skipping build (version_changed=$VERSION_CHANGED, release_missing=$RELEASE_MISSING)."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

  build-apk:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Build prod release APKs (arm64, x86_64)
        run: cd android && ./gradlew assembleProdRelease
      - name: Stage release APKs with public names
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-apks"
          SRC="$GITHUB_WORKSPACE/mobile/android/app/build/outputs/apk/prod/release"
          ls -la "$SRC"
          ARM64_APK="$(find "$SRC" -maxdepth 1 -name '*.apk' | grep 'arm64-v8a' | head -n 1)"
          X86_64_APK="$(find "$SRC" -maxdepth 1 -name '*.apk' | grep 'x86_64' | head -n 1)"
          if [ -z "$ARM64_APK" ] || [ ! -f "$ARM64_APK" ]; then
            echo "No arm64-v8a APK found under $SRC"
            exit 1
          fi
          if [ -z "$X86_64_APK" ] || [ ! -f "$X86_64_APK" ]; then
            echo "No x86_64 APK found under $SRC"
            exit 1
          fi
          cp "$ARM64_APK" "$GITHUB_WORKSPACE/release-apks/ChessZug-arm64.apk"
          cp "$X86_64_APK" "$GITHUB_WORKSPACE/release-apks/ChessZug-x86_64.apk"
      - name: Upload prod release APKs
        uses: actions/upload-artifact@v4
        with:
          name: chesszug-prod-release-apks
          path: release-apks/*.apk

  create-release:
    needs: [detect-version-change, build-apk]
    if: needs.detect-version-change.outputs.should_build == 'true' && needs.build-apk.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chesszug-prod-release-apks
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-change.outputs.release_tag }}
          name: ${{ needs.detect-version-change.outputs.release_tag }}
          generate_release_notes: true
          files: |
            artifacts/ChessZug-arm64.apk
            artifacts/ChessZug-x86_64.apk
