name: Android APK on Version Change

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 "$AFTER_SHA^" 2>/dev/null || true)"
          fi
          if [ -z "$BEFORE_SHA" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIFF="$(git diff "$BEFORE_SHA" "$AFTER_SHA" -- mobile/package.json mobile/android/app/build.gradle || true)"
          if echo "$DIFF" | grep -E '^[+-].*"version"\s*:' >/dev/null; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$DIFF" | grep -E '^[+-].*versionCode\s+[0-9]+' >/dev/null; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$DIFF" | grep -E '^[+-].*versionName\s+"[^"]+"' >/dev/null; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_build=false" >> "$GITHUB_OUTPUT"

  build-apk:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - id: meta
        name: Set release metadata
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build dev debug APK
        run: cd android && ./gradlew assembleDevDebug
      - name: Build prod release APK
        run: cd android && ./gradlew assembleProdRelease
      - name: Upload dev debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chesszug-dev-debug-apk
          path: mobile/android/app/build/outputs/apk/dev/debug/app-dev-debug.apk
      - name: Upload prod release APK
        uses: actions/upload-artifact@v4
        with:
          name: chesszug-prod-release-apk
          path: mobile/android/app/build/outputs/apk/prod/release/app-prod-release.apk

  create-release:
    needs: [detect-version-change, build-apk]
    if: needs.detect-version-change.outputs.should_build == 'true' && needs.build-apk.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chesszug-dev-debug-apk
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: chesszug-prod-release-apk
          path: artifacts
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-apk.outputs.release_tag }}
          name: ${{ needs.build-apk.outputs.release_tag }}
          generate_release_notes: true
          files: |
            artifacts/app-dev-debug.apk
            artifacts/app-prod-release.apk
