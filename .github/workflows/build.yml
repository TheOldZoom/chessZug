name: Android APK on Version Change

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          VERSION="$(node -p "require('./mobile/package.json').version")"
          RELEASE_TAG="v$VERSION"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          EVENT_NAME="${{ github.event_name }}"
          echo "event_name=$EVENT_NAME"
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 "$AFTER_SHA^" 2>/dev/null || true)"
          fi
          VERSION_CHANGED=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION_CHANGED=true
          elif [ -z "$BEFORE_SHA" ]; then
            VERSION_CHANGED=true
          else
            DIFF="$(git diff "$BEFORE_SHA" "$AFTER_SHA" -- mobile/package.json mobile/android/app/build.gradle || true)"
            if echo "$DIFF" | grep -E '^[+-].*"version"\s*:' >/dev/null; then
              VERSION_CHANGED=true
            fi
            if echo "$DIFF" | grep -E '^[+-].*versionCode\s+[0-9]+' >/dev/null; then
              VERSION_CHANGED=true
            fi
            if echo "$DIFF" | grep -E '^[+-].*versionName\s+"[^"]+"' >/dev/null; then
              VERSION_CHANGED=true
            fi
          fi
          if [ "$VERSION_CHANGED" = "false" ]; then
            echo "No version change detected; skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HTTP_STATUS="$(curl -s -o /tmp/release_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Release $RELEASE_TAG already exists; skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$HTTP_STATUS" != "404" ]; then
            echo "Failed to check release existence. HTTP $HTTP_STATUS"
            cat /tmp/release_check.json
            exit 1
          fi
          echo "Release $RELEASE_TAG does not exist; proceeding with build."
          echo "should_build=true" >> "$GITHUB_OUTPUT"

  build-apk:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Build dev debug APK
        run: cd android && ./gradlew assembleDevDebug
      - name: Build prod release APK
        run: cd android && ./gradlew assembleProdRelease
      - name: Upload dev debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chesszug-dev-debug-apk
          path: mobile/android/app/build/outputs/apk/dev/debug/app-dev-debug.apk
      - name: Upload prod release APK
        uses: actions/upload-artifact@v4
        with:
          name: chesszug-prod-release-apk
          path: mobile/android/app/build/outputs/apk/prod/release/app-prod-release.apk

  create-release:
    needs: [detect-version-change, build-apk]
    if: needs.detect-version-change.outputs.should_build == 'true' && needs.build-apk.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chesszug-dev-debug-apk
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: chesszug-prod-release-apk
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-change.outputs.release_tag }}
          name: ${{ needs.detect-version-change.outputs.release_tag }}
          generate_release_notes: true
          files: |
            artifacts/app-dev-debug.apk
            artifacts/app-prod-release.apk
